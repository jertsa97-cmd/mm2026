<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MM2026">
<title>MM 2026 — Jere</title>
<style>
:root{--bg:#f5f5f7;--card:#fff;--border:rgba(0,0,0,.08);--text:#1c1c1e;--sub:#6e6e73;--acc:#007aff;--gold:#ff9500;--gr:#34c759;--red:#ff3b30;--ebg:#fff8ec;--ebr:#ffd060;--wbg:#edfaf2;--wbr:#a3e6b8}
@media(prefers-color-scheme:dark){:root{--bg:#000;--card:#1c1c1e;--border:rgba(255,255,255,.1);--text:#f5f5f7;--sub:#8e8e93;--ebg:#2a2000;--ebr:#6b4f00;--wbg:#0a2a12;--wbr:#1a5c2a}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Text',sans-serif;font-size:15px}
.hdr{background:var(--card);border-bottom:.5px solid var(--border);padding:14px 16px 10px;position:sticky;top:0;z-index:100}
.hdr h1{font-size:17px;font-weight:600;letter-spacing:-.3px}
.hdr p{font-size:12px;color:var(--sub);margin-top:2px}
.scores{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px 4px}
.sc{background:var(--card);border-radius:12px;border:.5px solid var(--border);padding:10px 6px;text-align:center}
.sc-val{font-size:24px;font-weight:600;line-height:1;letter-spacing:-.5px}
.sc-val.g{color:var(--gold)}.sc-val.gr{color:var(--gr)}
.sc-lbl{font-size:10px;color:var(--sub);margin-top:3px}
.tabs{display:flex;background:var(--card);border-bottom:.5px solid var(--border);overflow-x:auto;padding:0 4px;position:sticky;top:76px;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;font-size:13px;font-weight:500;color:var(--sub);border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.ghdr{padding:6px 16px;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;background:var(--bg);border-bottom:.5px solid var(--border);margin-top:8px}
.mrow{background:var(--card);border-bottom:.5px solid var(--border);padding:10px 16px;display:grid;grid-template-columns:24px 1fr auto;gap:8px;align-items:center;cursor:pointer}
.mrow.ex{background:var(--ebg);border-left:3px solid var(--ebr);padding-left:13px}
.mrow.wi{background:var(--wbg);border-left:3px solid var(--wbr);padding-left:13px}
.mno{font-size:11px;color:var(--sub)}
.mteams{font-size:13px;line-height:1.3}
.mteams .aw{color:var(--sub);font-size:12px}
.mr{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.ms{font-size:14px;font-weight:600;letter-spacing:-.3px;font-variant-numeric:tabular-nums}
.mp{font-size:11px;color:var(--sub);font-variant-numeric:tabular-nums}
.mpt{font-size:13px;font-weight:600}
.p5{color:var(--gold)}.p3,.p4{color:var(--gr)}.p2{color:var(--acc)}.p1{color:var(--sub)}.p0{color:var(--sub);opacity:.5}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.overlay.hid{display:none}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px 24px 44px;width:100%;max-width:480px}
.modal h2{font-size:16px;font-weight:600;margin-bottom:3px}
.mpred{font-size:13px;color:var(--sub);margin-bottom:20px}
.sinp{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:24px}
.tcol{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1}
.tname{font-size:11px;color:var(--sub);text-align:center;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nctrl{display:flex;align-items:center;border:.5px solid var(--border);border-radius:12px;overflow:hidden}
.nctrl button{width:44px;height:44px;background:var(--bg);border:none;font-size:22px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center}
.nctrl button:active{opacity:.6}
.nctrl span{width:44px;text-align:center;font-size:22px;font-weight:600;font-variant-numeric:tabular-nums}
.sinp .vs{font-size:18px;color:var(--sub);padding-top:12px}
.mbtns{display:flex;gap:10px}
.btn{flex:1;padding:14px;border-radius:12px;border:none;font-size:16px;font-weight:600;cursor:pointer}
.bsv{background:var(--acc);color:#fff}
.bdl{background:var(--bg);color:var(--red)}
.btn:active{opacity:.8}
.bsec{padding:16px;display:flex;flex-direction:column;gap:10px}
.bcard{background:var(--card);border-radius:14px;border:.5px solid var(--border);padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.bclbl{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.bcpred{font-size:16px;font-weight:600}
.bcnote{font-size:11px;color:var(--sub);margin-top:3px}
.bcpts{font-size:26px;font-weight:600;color:var(--sub)}
.pane{padding-bottom:32px}
.pane.hid{display:none}
</style>
</head>
<body>
<div class="hdr">
  <h1>⚽ MM 2026 — Jere</h1>
  <p>Napauta ottelua syöttääksesi tuloksen</p>
</div>
<div class="scores">
  <div class="sc"><div class="sc-val g" id="sp">0</div><div class="sc-lbl">Pisteet</div></div>
  <div class="sc"><div class="sc-val gr" id="se">0</div><div class="sc-lbl">Täysin ✓</div></div>
  <div class="sc"><div class="sc-val" id="spl">0</div><div class="sc-lbl">Pelattu</div></div>
  <div class="sc"><div class="sc-val" id="sav" style="font-size:18px">—</div><div class="sc-lbl">p/peli</div></div>
</div>
<div class="tabs">
  <div class="tab on" onclick="showTab('gs')">Lohkovaihe</div>
  <div class="tab" onclick="showTab('r32')">Round of 32</div>
  <div class="tab" onclick="showTab('bon')">Erikoisveikkaukset</div>
</div>
<div id="pane-gs" class="pane"></div>
<div id="pane-r32" class="pane hid"></div>
<div id="pane-bon" class="pane hid"></div>
<div class="overlay hid" id="ov" onclick="closeM(event)">
  <div class="modal">
    <h2 id="mt"></h2>
    <div class="mpred" id="mpr"></div>
    <div class="sinp">
      <div class="tcol">
        <div class="tname" id="mhn"></div>
        <div class="nctrl">
          <button ontouchstart="" onclick="adj('h',-1)">−</button>
          <span id="mh">0</span>
          <button ontouchstart="" onclick="adj('h',1)">+</button>
        </div>
      </div>
      <div class="vs">–</div>
      <div class="tcol">
        <div class="tname" id="man"></div>
        <div class="nctrl">
          <button ontouchstart="" onclick="adj('a',-1)">−</button>
          <span id="ma">0</span>
          <button ontouchstart="" onclick="adj('a',1)">+</button>
        </div>
      </div>
    </div>
    <div class="mbtns">
      <button class="btn bdl" onclick="delR()">Poista</button>
      <button class="btn bsv" onclick="saveR()">Tallenna</button>
    </div>
  </div>
</div>
<script>
const P={1:{h:"Mexico",a:"South Africa",ph:2,pa:0},2:{h:"Rep. of Korea",a:"Czech Rep.",ph:0,pa:1},3:{h:"Canada",a:"Bosnia/Herzeg.",ph:3,pa:1},4:{h:"USA",a:"Paraguay",ph:1,pa:1},5:{h:"Haiti",a:"Scotland",ph:0,pa:2},6:{h:"Australia",a:"Turkey",ph:0,pa:2},7:{h:"Brazil",a:"Morocco",ph:3,pa:1},8:{h:"Qatar",a:"Switzerland",ph:0,pa:3},9:{h:"Ivory Coast",a:"Ecuador",ph:1,pa:1},10:{h:"Germany",a:"Curaçao",ph:5,pa:0},11:{h:"Netherlands",a:"Japan",ph:2,pa:0},12:{h:"Sweden",a:"Tunisia",ph:2,pa:1},13:{h:"Saudi Arabia",a:"Uruguay",ph:0,pa:3},14:{h:"Spain",a:"Cape Verde",ph:4,pa:0},15:{h:"IR Iran",a:"New Zealand",ph:1,pa:0},16:{h:"Belgium",a:"Egypt",ph:2,pa:0},17:{h:"France",a:"Senegal",ph:3,pa:1},18:{h:"Iraq",a:"Norway",ph:1,pa:3},19:{h:"Argentina",a:"Algeria",ph:3,pa:1},20:{h:"Austria",a:"Jordan",ph:3,pa:0},21:{h:"Ghana",a:"Panama",ph:2,pa:0},22:{h:"England",a:"Croatia",ph:2,pa:1},23:{h:"Portugal",a:"DR Congo",ph:3,pa:1},24:{h:"Uzbekistan",a:"Colombia",ph:1,pa:2},25:{h:"Czech Rep.",a:"South Africa",ph:2,pa:1},26:{h:"Switzerland",a:"Bosnia/Herzeg.",ph:2,pa:1},27:{h:"Canada",a:"Qatar",ph:2,pa:1},28:{h:"Mexico",a:"Rep. of Korea",ph:1,pa:1},29:{h:"Brazil",a:"Haiti",ph:4,pa:0},30:{h:"Scotland",a:"Morocco",ph:1,pa:2},31:{h:"Turkey",a:"Paraguay",ph:2,pa:0},32:{h:"USA",a:"Australia",ph:0,pa:0},33:{h:"Germany",a:"Ivory Coast",ph:2,pa:1},34:{h:"Ecuador",a:"Curaçao",ph:3,pa:1},35:{h:"Netherlands",a:"Sweden",ph:2,pa:2},36:{h:"Tunisia",a:"Japan",ph:0,pa:2},37:{h:"Uruguay",a:"Cape Verde",ph:2,pa:1},38:{h:"Spain",a:"Saudi Arabia",ph:4,pa:0},39:{h:"Belgium",a:"IR Iran",ph:3,pa:0},40:{h:"New Zealand",a:"Egypt",ph:1,pa:2},41:{h:"Norway",a:"Senegal",ph:2,pa:2},42:{h:"France",a:"Iraq",ph:4,pa:0},43:{h:"Argentina",a:"Austria",ph:2,pa:1},44:{h:"Jordan",a:"Algeria",ph:1,pa:2},45:{h:"England",a:"Ghana",ph:3,pa:0},46:{h:"Panama",a:"Croatia",ph:1,pa:3},47:{h:"Portugal",a:"Uzbekistan",ph:3,pa:1},48:{h:"Colombia",a:"DR Congo",ph:2,pa:0},49:{h:"Scotland",a:"Brazil",ph:1,pa:2},50:{h:"Morocco",a:"Haiti",ph:3,pa:1},51:{h:"Switzerland",a:"Canada",ph:2,pa:1},52:{h:"Bosnia/Herzeg.",a:"Qatar",ph:2,pa:1},53:{h:"Czech Rep.",a:"Mexico",ph:1,pa:2},54:{h:"South Africa",a:"Rep. of Korea",ph:1,pa:2},55:{h:"Curaçao",a:"Ivory Coast",ph:0,pa:3},56:{h:"Ecuador",a:"Germany",ph:1,pa:2},57:{h:"Japan",a:"Sweden",ph:1,pa:2},58:{h:"Tunisia",a:"Netherlands",ph:1,pa:3},59:{h:"Turkey",a:"USA",ph:2,pa:2},60:{h:"Paraguay",a:"Australia",ph:2,pa:1},61:{h:"Norway",a:"France",ph:1,pa:3},62:{h:"Senegal",a:"Iraq",ph:3,pa:0},63:{h:"Egypt",a:"IR Iran",ph:2,pa:0},64:{h:"New Zealand",a:"Belgium",ph:1,pa:3},65:{h:"Cape Verde",a:"Saudi Arabia",ph:1,pa:2},66:{h:"Uruguay",a:"Spain",ph:1,pa:2},67:{h:"Panama",a:"England",ph:1,pa:4},68:{h:"Croatia",a:"Ghana",ph:2,pa:2},69:{h:"Algeria",a:"Austria",ph:1,pa:1},70:{h:"Jordan",a:"Argentina",ph:0,pa:3},71:{h:"Colombia",a:"Portugal",ph:1,pa:1},72:{h:"DR Congo",a:"Uzbekistan",ph:1,pa:2},73:{h:"Czech Rep.",a:"Canada",ph:null,pa:null},74:{h:"Germany",a:"USA",ph:null,pa:null},75:{h:"Netherlands",a:"Morocco",ph:null,pa:null},76:{h:"Brazil",a:"Sweden",ph:null,pa:null},77:{h:"France",a:"Japan",ph:null,pa:null},78:{h:"Ivory Coast",a:"Senegal",ph:null,pa:null},79:{h:"Mexico",a:"Scotland",ph:null,pa:null},80:{h:"England",a:"Norway",ph:null,pa:null},81:{h:"Turkey",a:"Ecuador",ph:null,pa:null},82:{h:"Belgium",a:"Rep. of Korea",ph:null,pa:null},83:{h:"Colombia",a:"Croatia",ph:null,pa:null},84:{h:"Spain",a:"Austria",ph:null,pa:null},85:{h:"Switzerland",a:"Algeria",ph:null,pa:null},86:{h:"Argentina",a:"Uruguay",ph:null,pa:null},87:{h:"Portugal",a:"Ghana",ph:null,pa:null},88:{h:"Paraguay",a:"Egypt",ph:null,pa:null}};
const GRP={A:[1,2,25,28,53,54],B:[3,8,26,27,51,52],C:[7,5,30,29,49,50],D:[4,6,32,31,59,60],E:[10,9,33,34,56,55],F:[11,12,35,36,57,58],G:[16,15,39,40,63,64],H:[14,13,38,37,65,66],I:[17,18,42,41,61,62],J:[19,20,43,44,70,69],K:[23,24,47,48,71,72],L:[22,21,45,46,67,68]};
const R32=[73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88];
let R={};
try{const s=localStorage.getItem('mm26r');if(s){const x=JSON.parse(s);for(const k in x)R[+k]=x[k];}}catch(e){}
let emn=null,eh=0,ea=0;
function pts(ph,pa,rh,ra){if(ph==null||pa==null)return null;if(ph===rh&&pa===ra)return 5;let p=0;if(Math.sign(ph-pa)===Math.sign(rh-ra))p+=2;if(ph===rh)p+=1;if(pa===ra)p+=1;return p;}
function pc(p){return p===null?'':`p${p}`;}
function save(){localStorage.setItem('mm26r',JSON.stringify(R));}
function render(){
  let tot=0,pl=0,ex=0;const MP={};
  for(const mn of Object.keys(P).map(Number)){const m=P[mn],r=R[mn];if(r!==undefined&&m.ph!=null){const p=pts(m.ph,m.pa,r.rh,r.ra);MP[mn]=p;if(p!=null){tot+=p;pl++;if(p===5)ex++;}}else MP[mn]=null;}
  document.getElementById('sp').textContent=tot;
  document.getElementById('se').textContent=ex;
  document.getElementById('spl').textContent=pl;
  document.getElementById('sav').textContent=pl>0?(tot/pl).toFixed(1):'—';
  let gs='',cum=0;
  for(const g of Object.keys(GRP)){
    gs+=`<div class="ghdr">Lohko ${g}</div>`;
    for(const mn of GRP[g]){const p=MP[mn];if(p!=null)cum+=p;gs+=row(mn,MP,p!=null?cum:null);}
  }
  document.getElementById('pane-gs').innerHTML=gs;
  let r2='<div style="height:8px"></div>',c2=0;
  for(const mn of R32){const p=MP[mn];if(p!=null)c2+=p;r2+=row(mn,MP,p!=null?c2:null);}
  document.getElementById('pane-r32').innerHTML=r2;
  let bon='<div class="bsec">';
  for(const b of [{l:'Maalikuningas',p:'Kylian Mbappé'},{l:'Mestari',p:'Englanti'},{l:'Sijalle 1',p:'(lohkovaiheen jälkeen)'},{l:'Sijalle 2',p:'(lohkovaiheen jälkeen)'},{l:'Sijalle 3',p:'(lohkovaiheen jälkeen)'},{l:'Sijalle 4',p:'(lohkovaiheen jälkeen)'}]){
    bon+=`<div class="bcard"><div><div class="bclbl">${b.l}</div><div class="bcpred">${b.p}</div><div class="bcnote">25p jos oikein</div></div><div class="bcpts">+?</div></div>`;}
  bon+='</div>';
  document.getElementById('pane-bon').innerHTML=bon;
}
function row(mn,MP,cum){
  const m=P[mn],r=R[mn],p=MP[mn];
  const rc=p===5?'mrow ex':p>=2?'mrow wi':'mrow';
  const rs=r?`${r.rh}–${r.ra}`:'—';
  const sc=r?'':'style="color:var(--sub)"';
  const pr=m.ph!=null?`${m.ph}–${m.pa}`:'—';
  const pd=m.ph!=null?`Veik. ${pr}`:'Ei veikk.';
  const cd=cum!=null?`<span style="font-size:10px;color:var(--sub);margin-left:3px">${cum}</span>`:'';
  return `<div class="${rc}" onclick="open(${mn})"><div class="mno">${mn}</div><div class="mteams"><span>${m.h}</span><span class="aw">${m.a}</span></div><div class="mr"><div class="ms" ${sc}>${rs}</div><div class="mp">${pd}</div><div class="mpt ${pc(p)}">${p!=null?p+'p':''} ${cd}</div></div></div>`;
}
function showTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',['gs','r32','bon'][i]===n));
  ['gs','r32','bon'].forEach(x=>document.getElementById(`pane-${x}`).classList.toggle('hid',x!==n));
}
function open(mn){
  emn=mn;const m=P[mn],r=R[mn];eh=r?r.rh:0;ea=r?r.ra:0;
  document.getElementById('mt').textContent=`Peli ${mn}: ${m.h} – ${m.a}`;
  document.getElementById('mpr').textContent=m.ph!=null?`Veikkauksesi: ${m.ph}–${m.pa}`:'Ei veikkausta';
  document.getElementById('mhn').textContent=m.h;
  document.getElementById('man').textContent=m.a;
  document.getElementById('mh').textContent=eh;
  document.getElementById('ma').textContent=ea;
  document.getElementById('ov').classList.remove('hid');
  document.body.style.overflow='hidden';
}
function closeM(e){if(e&&e.target!==document.getElementById('ov'))return;document.getElementById('ov').classList.add('hid');document.body.style.overflow='';}
function adj(s,d){if(s==='h'){eh=Math.max(0,Math.min(20,eh+d));document.getElementById('mh').textContent=eh;}else{ea=Math.max(0,Math.min(20,ea+d));document.getElementById('ma').textContent=ea;}}
function saveR(){R[emn]={rh:eh,ra:ea};save();document.getElementById('ov').classList.add('hid');document.body.style.overflow='';render();}
function delR(){delete R[emn];save();document.getElementById('ov').classList.add('hid');document.body.style.overflow='';render();}
render();
</script>
</body>
</html>
