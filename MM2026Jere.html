<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MM2026">
<title>MM 2026 — Jere</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--card2:#1f2937;--brd:rgba(255,255,255,.08);--txt:#f0f6fc;--sub:#8b949e;--acc:#58a6ff;--gold:#ffa726;--grn:#3fb950;--red:#f85149;--ex:rgba(255,167,38,.12);--exb:rgba(255,167,38,.4);--wi:rgba(63,185,80,.1);--wib:rgba(63,185,80,.35)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{background:var(--bg);color:var(--txt);font-family:-apple-system,'SF Pro Text',sans-serif;min-height:100%}
#hdr{background:var(--bg);border-bottom:1px solid var(--brd);padding:18px 16px 14px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between}
#hdr h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
#hdr p{font-size:12px;color:var(--sub);margin-top:2px}
#scores{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 16px 6px}
.sc{background:var(--card);border-radius:14px;border:1px solid var(--brd);padding:12px 6px;text-align:center}
.scv{font-size:24px;font-weight:700;line-height:1;letter-spacing:-.5px}
.scv.gold{color:var(--gold)}.scv.grn{color:var(--grn)}.scv.acc{color:var(--acc)}
.scl{font-size:10px;color:var(--sub);margin-top:4px;text-transform:uppercase;letter-spacing:.4px}
#tabs{display:flex;background:var(--card);border-bottom:1px solid var(--brd);overflow-x:auto;position:sticky;top:78px;z-index:49;padding:0 8px}
#tabs::-webkit-scrollbar{display:none}
.tb{padding:12px 14px;font-size:13px;font-weight:500;color:var(--sub);border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;flex-shrink:0}
.tb.on{color:var(--acc);border-bottom-color:var(--acc)}
.pane{display:none;padding-bottom:40px}.pane.on{display:block}
.ghd{display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;background:var(--bg);border-bottom:1px solid var(--brd);margin-top:10px}
.ghd-dot{width:6px;height:6px;border-radius:50%;background:var(--acc);flex-shrink:0}
.mr{background:var(--card);border-bottom:1px solid var(--brd);padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;-webkit-user-select:none}
.mr:active{background:var(--card2)}
.mr.ex{background:var(--ex);border-left:3px solid var(--gold);padding-left:11px}
.mr.wi{background:var(--wi);border-left:3px solid var(--wib);padding-left:11px}
.mnum{font-size:11px;color:var(--sub);min-width:20px;flex-shrink:0}
.mteams{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.mteam-row{display:flex;align-items:center;gap:7px}
.mflag{font-size:18px;line-height:1;flex-shrink:0;width:24px}
.mname{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mname.away{color:var(--sub);font-weight:400;font-size:12px}
.mscores{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;min-width:80px}
.mscore-row{display:flex;align-items:center;justify-content:flex-end;gap:6px;width:100%}
.mres{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;min-width:32px;text-align:center}
.mres.pend{color:var(--sub);font-weight:400;font-size:13px}
.mpred{font-size:11px;color:var(--sub);font-variant-numeric:tabular-nums;min-width:32px;text-align:center}
.mpts-row{display:flex;align-items:center;justify-content:flex-end;gap:4px}
.mpt{font-size:12px;font-weight:700}
.mpt.p5{color:var(--gold)}.mpt.p3,.mpt.p4{color:var(--grn)}.mpt.p2{color:var(--acc)}.mpt.p1{color:var(--sub)}.mpt.p0{color:var(--sub);opacity:.4}
.mcum{font-size:10px;color:var(--sub)}

/* MODAL */
#mwrap{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);align-items:flex-end;justify-content:center}
#mwrap.open{display:flex}
#modal{background:var(--card);border-radius:24px 24px 0 0;padding:6px 0 0;width:100%;max-width:500px;border-top:1px solid var(--brd);max-height:92vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--brd);margin:10px auto 18px}
.modal-inner{padding:0 20px 48px}
#mt{font-size:17px;font-weight:700;margin-bottom:4px}
#msub{font-size:13px;color:var(--sub);margin-bottom:20px}

/* TEAM PICKERS in modal */
.team-pickers{display:flex;gap:10px;margin-bottom:20px}
.tpick{flex:1;background:var(--card2);border:1px solid var(--brd);border-radius:12px;padding:10px;text-align:center;cursor:pointer}
.tpick:active{opacity:.7}
.tpick .tpf{font-size:26px}
.tpick .tpn{font-size:11px;color:var(--sub);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tpick-label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;text-align:center}

/* SCORE INPUT */
.sinp{display:flex;align-items:flex-start;justify-content:center;gap:8px;margin-bottom:28px}
.tcol{display:flex;flex-direction:column;align-items:center;gap:10px;flex:1}
.tflag{font-size:34px;line-height:1}
.tname{font-size:12px;color:var(--sub);text-align:center;line-height:1.3}
.nctl{display:flex;align-items:center;background:var(--card2);border-radius:16px;overflow:hidden;border:1px solid var(--brd)}
.nctl button{width:50px;height:50px;background:none;border:none;font-size:28px;color:var(--txt);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nctl button:active{background:rgba(255,255,255,.08)}
.nctl .num{width:50px;text-align:center;font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;pointer-events:none}
.vsep{font-size:22px;color:var(--sub);flex-shrink:0;margin-top:54px}
.mbtns{display:flex;gap:10px}
.mbtn{flex:1;padding:16px;border-radius:14px;border:none;font-size:16px;font-weight:600;cursor:pointer}
.mbtn:active{opacity:.75}
.mbtn.save{background:var(--acc);color:#fff}
.mbtn.del{background:var(--card2);color:var(--red);border:1px solid var(--brd)}

/* TEAM PICKER MODAL */
#tpwrap{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.75);align-items:flex-end;justify-content:center}
#tpwrap.open{display:flex}
#tpmodal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:500px;max-height:80vh;display:flex;flex-direction:column}
#tpmodal h3{font-size:16px;font-weight:700;padding:20px 20px 12px;border-bottom:1px solid var(--brd)}
#tp-search{margin:12px 16px;background:var(--card2);border:1px solid var(--brd);border-radius:10px;padding:10px 14px;color:var(--txt);font-size:15px;width:calc(100% - 32px)}
#tp-search::placeholder{color:var(--sub)}
#tp-list{overflow-y:auto;flex:1;padding-bottom:20px}
.tp-item{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;border-bottom:1px solid var(--brd)}
.tp-item:active{background:var(--card2)}
.tp-flag{font-size:22px;width:30px}
.tp-name{font-size:15px}

/* BONUS */
.bsec{padding:16px;display:flex;flex-direction:column;gap:10px}
.bcard{background:var(--card);border-radius:16px;border:1px solid var(--brd);padding:16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.bcard:active{background:var(--card2)}
.blbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.bprd{font-size:16px;font-weight:600}
.bnot{font-size:11px;color:var(--sub);margin-top:4px}
.bpts{font-size:30px;font-weight:700;color:var(--sub)}
.bpts.won{color:var(--gold)}

/* BONUS PICKER MODAL */
#bpwrap{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.75);align-items:flex-end;justify-content:center}
#bpwrap.open{display:flex}
#bpmodal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:500px;max-height:80vh;display:flex;flex-direction:column}
#bpmodal h3{font-size:16px;font-weight:700;padding:20px 20px 12px;border-bottom:1px solid var(--brd)}
#bp-search{margin:12px 16px;background:var(--card2);border:1px solid var(--brd);border-radius:10px;padding:10px 14px;color:var(--txt);font-size:15px;width:calc(100% - 32px)}
#bp-search::placeholder{color:var(--sub)}
#bp-list{overflow-y:auto;flex:1;padding-bottom:20px}
</style>
</head>

</div>

<div id="tabs">

<div id="pane0" class="pane on"></div>

<div id="pane2" class="pane"></div>

<div id="mwrap" onclick="bgClick(event)">

    <div class="modal-handle"></div>

      <div id="mt"></div>
      <div id="msub"></div>
      <div id="team-pickers-area" style="display:none">

          <div style="display:flex;align-items:center;color:var(--sub);font-size:18px">–</div>

            <div class="num" id="ma">0</div>
            <button onclick="adj('a',1)">+</button>
          </div>
        </div>
      </div>
      <div class="mbtns">
        <button class="mbtn del" onclick="delR()">Poista</button>
        <button class="mbtn save" onclick="saveR()">Tallenna</button>
      </div>
    </div>
  </div>
</div>

<!-- TEAM PICKER MODAL -->
<div id="tpwrap" onclick="tpBgClick(event)">

    <div id="tp-list"></div>
  </div>
</div>

<!-- BONUS PICKER MODAL -->
<div id="bpwrap" onclick="bpBgClick(event)">

</div>

var R={},KOT={},BON={};
try{
  var s=localStorage.getItem('mm26r');if(s){var t=JSON.parse(s);for(var k in t)R[parseInt(k)]=t[k];}
  var s2=localStorage.getItem('mm26ko');if(s2){var t2=JSON.parse(s2);for(var k in t2)KOT[parseInt(k)]=t2[k];}
  var s3=localStorage.getItem('mm26bon');if(s3)BON=JSON.parse(s3);
}catch(e){}

var emn=null,eIsKO=false,eh=0,ea=0,ePicking=null;
var bpKey=null;

function calcPts(ph,pa,rh,ra){
  if(ph===null||pa===null)return null;
  if(ph===rh&&pa===ra)return 5;
  var p=0,ps=ph>pa?1:ph<pa?-1:0,rs=rh>ra?1:rh<ra?-1:0;
  if(ps===rs)p+=2;if(ph===rh)p+=1;if(pa===ra)p+=1;return p;
}
function saveData(){
  try{localStorage.setItem('mm26r',JSON.stringify(R));localStorage.setItem('mm26ko',JSON.stringify(KOT));localStorage.setItem('mm26bon',JSON.stringify(BON));}catch(e){}
}

function renderAll(){
  var tot=0,pl=0,ex=0,MP={};
  // Group stage
  var gkeys=Object.keys(P);
  for(var i=0;i<gkeys.length;i++){
    var mn=parseInt(gkeys[i]),m=P[mn],r=R[mn];
    if(r!==undefined&&m.ph!==null){var p=calcPts(m.ph,m.pa,r.rh,r.ra);MP[mn]=p;if(p!==null){tot+=p;pl++;if(p===5)ex++;}}
    else MP[mn]=null;
  }
  // KO stage — no pre-predictions, just record
  var kokeys=Object.keys(KO);
  for(var i=0;i<kokeys.length;i++){
    var mn=parseInt(kokeys[i]),r=R[mn];
    MP[mn]=null; // no prediction points for KO
  }

  document.getElementById('sp').textContent=tot;
  document.getElementById('se').textContent=ex;
  document.getElementById('spl').textContent=pl;
  document.getElementById('sav').textContent=pl>0?(tot/pl).toFixed(1):'—';

  // Render group stage
  var gs='',cum=0;
  var gk=Object.keys(GRP);
  for(var gi=0;gi<gk.length;gi++){
    var g=gk[gi],mns=GRP[g];
    gs+='<div class="ghd"><div class="ghd-dot"></div>Lohko '+g+'</div>';
    for(var mi=0;mi<mns.length;mi++){var mn=mns[mi],p=MP[mn];if(p!==null&&p!==undefined)cum+=p;gs+=makeRow(mn,P[mn],p,cum,false);}
  }
  document.getElementById('pane0').innerHTML=gs;

  // Render KO
  var ko='';
  for(var si=0;si<KO_SECTIONS.length;si++){
    var sec=KO_SECTIONS[si];
    ko+='<div class="ghd"><div class="ghd-dot"></div>'+sec.lbl+'</div>';
    for(var mi=0;mi<sec.mns.length;mi++){
      var mn=sec.mns[mi];
      var m=KOT[mn]?{h:KOT[mn].h,a:KOT[mn].a}:KO[mn];
      var r=R[mn];
      ko+=makeRow(mn,m,null,null,true);
    }
  }
  document.getElementById('pane1').innerHTML=ko;

  // Render bonus
  renderBonus();
}

function makeRow(mn,m,p,cum,isKO){
  var r=R[mn];
  var rc=p===5?'mr ex':(p!==null&&p>=2?'mr wi':'mr');
  var res=r?(r.rh+'–'+r.ra):'—';
  var rescls=r?'mres':'mres pend';
  var pred=(!isKO&&m.ph!==null)?(m.ph+'–'+m.pa):'';
  var ptstr=p!==null?(p+'p'):'';
  var pcls=p!==null?('mpt p'+p):'mpt';
  var cumstr=(p!==null&&cum!==null)?'<span class="mcum">'+cum+'</span>':'';
  var lbl=isKO?('<span style="font-size:9px;color:var(--sub);display:block">'+KO[mn].lbl+'</span>'):'';
  var hname=m.h==='?'?'<span style="color:var(--sub)">TBD</span>':m.h;
  var aname=m.a==='?'?'<span style="color:var(--sub)">TBD</span>':m.a;
  return '<div class="'+rc+'" onclick="openModal('+mn+','+isKO+')">'
    +'<div class="mnum">'+mn+lbl+'</div>'
    +'<div class="mteams">'
    +'<div class="mteam-row"><span class="mflag">'+fl(m.h)+'</span><span class="mname">'+hname+'</span></div>'
    +'<div class="mteam-row"><span class="mflag">'+fl(m.a)+'</span><span class="mname away">'+aname+'</span></div>'
    +'</div>'
    +'<div class="mscores">'
    +'<div class="mscore-row">'+(pred?'<span class="mpred">'+pred+'</span>':'')+'<span class="'+rescls+'">'+res+'</span></div>'
    +'<div class="mpts-row"><span class="'+pcls+'">'+ptstr+'</span>'+cumstr+'</div>'
    +'</div></div>';
}

function showTab(i){
  var tabs=document.querySelectorAll('.tb'),panes=document.querySelectorAll('.pane');
  for(var t=0;t<tabs.length;t++)tabs[t].classList.toggle('on',t===i);
  for(var p=0;p<panes.length;p++)panes[p].classList.toggle('on',p===i);
}

function openModal(mn,isKO){
  emn=mn;eIsKO=isKO;
  var m=isKO?(KOT[mn]||KO[mn]):P[mn],r=R[mn];
  eh=r?r.rh:0;ea=r?r.ra:0;
  document.getElementById('mt').textContent='Peli '+mn+(KO[mn]?' · '+KO[mn].lbl:'');
  document.getElementById('msub').textContent=isKO?'Syötä tulos ja vaihda joukkueet tarvittaessa':(m.ph!==null?'Veikkauksesi: '+m.ph+'–'+m.pa:'Ei veikkausta');
  document.getElementById('team-pickers-area').style.display=isKO?'block':'none';
  document.getElementById('mhf').textContent=fl(m.h);
  document.getElementById('mhn').textContent=m.h==='?'?'TBD':m.h;
  document.getElementById('maf').textContent=fl(m.a);
  document.getElementById('man').textContent=m.a==='?'?'TBD':m.a;
  document.getElementById('tpf-h').textContent=fl(m.h);
  document.getElementById('tpn-h').textContent=m.h==='?'?'Valitse':m.h;
  document.getElementById('tpf-a').textContent=fl(m.a);
  document.getElementById('tpn-a').textContent=m.a==='?'?'Valitse':m.a;
  document.getElementById('mh').textContent=eh;
  document.getElementById('ma').textContent=ea;
  document.getElementById('mwrap').classList.add('open');
  document.body.style.overflow='hidden';
}

function bgClick(e){if(e.target===document.getElementById('mwrap'))closeModal();}
function closeModal(){document.getElementById('mwrap').classList.remove('open');document.body.style.overflow='';}

function adj(side,d){
  if(side==='h'){eh=Math.max(0,Math.min(20,eh+d));document.getElementById('mh').textContent=eh;}
  else{ea=Math.max(0,Math.min(20,ea+d));document.getElementById('ma').textContent=ea;}
}

function saveR(){
  var m=eIsKO?(KOT[emn]||KO[emn]):P[emn];
  if(m.h!=='?'&&m.a!=='?'){R[emn]={rh:eh,ra:ea};}
  saveData();closeModal();renderAll();
}
function delR(){delete R[emn];saveData();closeModal();renderAll();}

// TEAM PICKER
function openTeamPicker(side){
  ePicking=side;
  document.getElementById('tp-title').textContent=side==='h'?'Kotijoukkue':'Vierasjoukkue';
  document.getElementById('tp-search').value='';
  renderTeamList('');
  document.getElementById('tpwrap').classList.add('open');
}
function tpBgClick(e){if(e.target===document.getElementById('tpwrap')){document.getElementById('tpwrap').classList.remove('open');}}
function filterTeams(q){renderTeamList(q);}
function renderTeamList(q){
  var teams=ALL_TEAMS.filter(function(t){return t.toLowerCase().indexOf(q.toLowerCase())>=0;});
  var html='';
  for(var i=0;i<teams.length;i++){
    var t=teams[i];
    html+='<div class="tp-item" onclick="pickTeam(\''+t.replace(/'/g,"\\'")+'\')">'
      +'<div class="tp-flag">'+fl(t)+'</div>'
      +'<div class="tp-name">'+t+'</div>'
      +'</div>';
  }
  document.getElementById('tp-list').innerHTML=html;
}
function pickTeam(name){
  if(!KOT[emn])KOT[emn]={h:KO[emn].h,a:KO[emn].a};
  if(ePicking==='h'){
    KOT[emn].h=name;
    document.getElementById('mhf').textContent=fl(name);
    document.getElementById('mhn').textContent=name;
    document.getElementById('tpf-h').textContent=fl(name);
    document.getElementById('tpn-h').textContent=name;
  } else {
    KOT[emn].a=name;
    document.getElementById('maf').textContent=fl(name);
    document.getElementById('man').textContent=name;
    document.getElementById('tpf-a').textContent=fl(name);
    document.getElementById('tpn-a').textContent=name;
  }
  saveData();
  document.getElementById('tpwrap').classList.remove('open');
}

// BONUS
var BONUS_DEFS=[
  {key:'king',lbl:'Maalikuningas',pred:'Kylian Mbappé',f:'🇫🇷',pts:25},
  {key:'champ',lbl:'Mestari',pred:'Englanti',f:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',pts:25},
  {key:'p1',lbl:'1. sija',pred:'',f:'🥇',pts:25},
  {key:'p2',lbl:'2. sija',pred:'',f:'🥈',pts:25},
  {key:'p3',lbl:'3. sija',pred:'',f:'🥉',pts:25},
  {key:'p4',lbl:'4. sija',pred:'',f:'4️⃣',pts:25}
];

function renderBonus(){
  var html='<div class="bsec">';
  for(var i=0;i<BONUS_DEFS.length;i++){
    var b=BONUS_DEFS[i];
    var fixed=(b.key==='king'||b.key==='champ');
    var val=BON[b.key]||b.pred;
    var flag=FL[val]||b.f;
    var onclick=fixed?'':' onclick="openBonusPicker(\''+b.key+'\')"';
    var note=fixed?(b.pts+'p · kiinteä veikkaus'):(b.pts+'p · napauta vaihtaaksesi');
    var cursor=fixed?'default':'pointer';
    html+='<div class="bcard" style="cursor:'+cursor+'"'+onclick+'>'
      +'<div style="display:flex;align-items:center;gap:12px">'
      +'<div style="font-size:30px">'+flag+'</div>'
      +'<div><div class="blbl">'+b.lbl+'</div>'
      +'<div class="bprd">'+(val||'Napauta valitaksesi')+'</div>'
      +'<div class="bnot">'+note+'</div></div>'
      +'</div>'
      +'<div class="bpts">+?</div>'
      +'</div>';
  }
  html+='</div>';
  document.getElementById('pane2').innerHTML=html;
}

function openBonusPicker(key){
  if(key==='king'||key==='champ')return;
  bpKey=key;
  var def=BONUS_DEFS.filter(function(b){return b.key===key;})[0];
  document.getElementById('bp-title').textContent=def.lbl;
  document.getElementById('bp-search').value='';
  renderBonusList('');
  document.getElementById('bpwrap').classList.add('open');
}
function bpBgClick(e){if(e.target===document.getElementById('bpwrap')){document.getElementById('bpwrap').classList.remove('open');}}
function filterBonus(q){renderBonusList(q);}
function renderBonusList(q){
  var teams=ALL_TEAMS.filter(function(t){return t.toLowerCase().indexOf(q.toLowerCase())>=0;});
  var html='';
  for(var i=0;i<teams.length;i++){
    var t=teams[i];
    html+='<div class="tp-item" onclick="pickBonus(\''+t.replace(/'/g,"\\'")+'\')">'
      +'<div class="tp-flag">'+fl(t)+'</div>'
      +'<div class="tp-name">'+t+'</div>'
      +'</div>';
  }
  document.getElementById('bp-list').innerHTML=html;
}
function pickBonus(name){
  BON[bpKey]=name;
  saveData();
  document.getElementById('bpwrap').classList.remove('open');
  renderBonus();
}

renderAll();
</script>
</body>
</html>
